<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WinBola Saran BJ - Situs Bola Terpercaya</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #FFD700; --gold-dark: #B8860B; --silver: #C0C0C0;
  --black: #000000; --accent-blue: #00BFFF; --accent-red: #FF2222;
  --green: #25D366; --telegram: #229ED9;
}
body { background: #000; font-family: 'Rajdhani', sans-serif; min-height: 100vh; overflow-x: hidden; position: relative; }

.bg-stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.star { position: absolute; border-radius: 50%; animation: twinkle var(--d,3s) ease-in-out infinite alternate; opacity: 0; }
@keyframes twinkle { 0%{opacity:0;transform:scale(0.5)} 100%{opacity:var(--o,0.8);transform:scale(1.2)} }
.bg-glow { position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse 80% 60% at 50% 20%, rgba(255,180,0,0.10) 0%, transparent 70%),
              radial-gradient(ellipse 60% 40% at 50% 100%, rgba(255,140,0,0.08) 0%, transparent 60%); }

.container { position: relative; z-index: 2; max-width: 480px; margin: 0 auto; padding: 0 0 48px; text-align: center; }

/* LOGO */
.logo-hero { position: relative; width: 100%; background: #000;
  animation: logoEntrance 1s cubic-bezier(.22,1,.36,1) both;
  -webkit-mask-image: linear-gradient(to bottom, #000 65%, transparent 100%);
  mask-image: linear-gradient(to bottom, #000 65%, transparent 100%); }
@keyframes logoEntrance { from{opacity:0;transform:scale(0.9) translateY(-20px)} to{opacity:1;transform:scale(1) translateY(0)} }
.logo-hero img { width: 100%; display: block; mix-blend-mode: lighten; }

.tagline-wrap { margin-top: -18px; padding-bottom: 18px; position: relative; z-index: 3; animation: fadeUp 0.8s 0.3s both; }
.top-badge { display: inline-block; background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-dark));
  color: var(--black); font-family: 'Bebas Neue', sans-serif; font-size: 0.82rem; letter-spacing: 3px;
  padding: 5px 22px; border-radius: 30px; box-shadow: 0 0 22px rgba(255,215,0,0.6);
  animation: badgePulse 2s ease-in-out infinite alternate; }
@keyframes badgePulse { from{box-shadow:0 0 10px rgba(255,215,0,0.4)} to{box-shadow:0 0 32px rgba(255,215,0,1)} }
.tagline { margin-top: 8px; color: rgba(220,220,220,0.85); font-size: 0.95rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
.tagline span { color: var(--gold); }

@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

/* HERO POSTER */
.hero-poster { position: relative; margin: 20px 16px 22px; border-radius: 16px; overflow: hidden;
  box-shadow: 0 0 0 2px rgba(255,215,0,0.4), 0 0 40px rgba(255,215,0,0.2), 0 20px 60px rgba(0,0,0,0.9);
  animation: posterEntrance 1.1s 0.2s cubic-bezier(.22,1,.36,1) both; }
@keyframes posterEntrance { from{opacity:0;transform:scale(0.92) translateY(24px)} to{opacity:1;transform:scale(1) translateY(0)} }
.hero-poster img { width: 100%; display: block; border-radius: 16px; }
.hero-poster::after { content:''; position:absolute; inset:0; border-radius:16px;
  background: linear-gradient(135deg, rgba(255,215,0,0.12) 0%, transparent 50%, rgba(255,215,0,0.08) 100%);
  pointer-events:none; }

/* INFO STRIP */
.info-strip { display: flex; margin: 0 16px 20px;
  background: linear-gradient(135deg, #0d0d00, #1a1200);
  border: 1px solid rgba(255,215,0,0.25); border-radius: 10px; overflow: hidden;
  animation: fadeUp 0.8s 0.5s both; }
.info-item { flex: 1; padding: 11px 6px; border-right: 1px solid rgba(255,215,0,0.15); }
.info-item:last-child { border-right: none; }
.info-label { font-size: 0.6rem; color: var(--silver); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 3px; }
.info-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.6); }

/* ASIA BADGE */
.asia-badge { display: inline-flex; align-items: center; gap: 10px;
  background: linear-gradient(90deg, #cc0000, var(--accent-red), #cc0000);
  color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 3px;
  padding: 8px 28px; border-radius: 6px; margin-bottom: 22px;
  box-shadow: 0 0 24px rgba(255,34,34,0.55), 0 4px 15px rgba(0,0,0,0.7);
  animation: fadeUp 0.8s 0.6s both; }
.asia-badge::before, .asia-badge::after { content: '★'; color: var(--gold); }

/* BUTTONS */
.btn-group { display: flex; flex-direction: column; gap: 12px; margin: 0 16px; animation: fadeUp 0.8s 0.7s both; }
.btn { display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 15px 20px; border: none; border-radius: 8px;
  font-family: 'Bebas Neue', sans-serif; font-size: 1.15rem; letter-spacing: 3px;
  cursor: pointer; position: relative; overflow: hidden;
  transition: transform 0.15s, box-shadow 0.2s; text-decoration: none; text-align: center; }
.btn:active { transform: scale(0.97); }
.btn::after { content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent);
  animation: sweep 2.8s ease-in-out infinite; }
@keyframes sweep { 0%{left:-100%} 55%{left:140%} 100%{left:140%} }
.btn-icon { font-size: 1.3rem; line-height: 1; }

/* Gold Login */
.btn-login { background: linear-gradient(135deg, #a06800, var(--gold), #c8930a, var(--gold), #a06800);
  background-size: 200% auto; color: #000; font-weight: 900;
  box-shadow: 0 4px 24px rgba(255,215,0,0.55), inset 0 1px 0 rgba(255,255,255,0.35); }
.btn-login:hover { box-shadow: 0 8px 35px rgba(255,215,0,0.85); transform: translateY(-2px); }

/* Gold outline Register */
.btn-register { background: #000; color: var(--gold); border: 2px solid var(--gold);
  box-shadow: 0 4px 20px rgba(255,215,0,0.18), inset 0 0 16px rgba(255,215,0,0.05); }
.btn-register:hover { background: #1a1200; box-shadow: 0 6px 30px rgba(255,215,0,0.5); transform: translateY(-2px); }

/* WhatsApp */
.btn-wa { background: linear-gradient(135deg, #128C7E, var(--green), #128C7E);
  color: #fff; box-shadow: 0 4px 20px rgba(37,211,102,0.35); }
.btn-wa:hover { box-shadow: 0 8px 35px rgba(37,211,102,0.6); transform: translateY(-2px); }

/* Telegram */
.btn-tg { background: linear-gradient(135deg, #1a7ab5, var(--telegram), #1a7ab5);
  color: #fff; box-shadow: 0 4px 20px rgba(34,158,217,0.35); }
.btn-tg:hover { box-shadow: 0 8px 35px rgba(34,158,217,0.6); transform: translateY(-2px); }

/* DIVIDER */
.divider { display: flex; align-items: center; gap: 10px; margin: 18px 16px 6px; animation: fadeUp 0.8s 0.75s both; }
.divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,215,0,0.3), transparent); }
.divider-text { font-family: 'Bebas Neue', sans-serif; font-size: 0.75rem; color: rgba(255,215,0,0.5); letter-spacing: 2px; }

/* FOOTER */
.footer { margin-top: 32px; color: rgba(255,255,255,0.28); font-size: 0.7rem; letter-spacing: 1px; animation: fadeUp 0.8s 1s both; }
.footer span { color: var(--gold); opacity: 0.65; }
.search-hint { margin-top: 6px; font-size: 0.68rem; color: rgba(255,215,0,0.4); letter-spacing: 1.5px; text-transform: uppercase; }
</style>
</head>
