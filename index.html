<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#050510" />
<title>VipHack Pro ⚡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #00f0ff;
  --primary-rgb: 0, 240, 255;
  --secondary: #ff00e5;
  --secondary-rgb: 255, 0, 229;
  --success: #00ff9d;
  --success-rgb: 0, 255, 157;
  --danger: #ff3860;
  --warning: #ffdd00;
  --big: #ff6b6b;
  --small: #4ecdc4;
  --dark: #050510;
}

* { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  overflow: hidden;
  touch-action: manipulation;
  font-family: 'Rajdhani', sans-serif;
  background: var(--dark);
  color: #fff;
  width: 100vw;
  height: 100vh;
  position: fixed;
}

/* ===== GAME IFRAME ===== */
.game-container {
  position: fixed;
  inset: 0;
  z-index: 1;
}

.game-iframe {
  width: 100%;
  height: 100%;
  border: 0;
}

/* ===== PARTICLES ===== */
.particles {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  overflow: hidden;
}

.particle {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
}

.particle-glow {
  width: 4px;
  height: 4px;
  background: var(--primary);
  box-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
  animation: particleFloat 15s linear infinite;
}

.particle-spark {
  width: 2px;
  height: 2px;
  background: #fff;
  box-shadow: 0 0 5px #fff;
  animation: particleSpark 8s linear infinite;
}

.particle-orb {
  width: 6px;
  height: 6px;
  background: radial-gradient(circle, var(--secondary), transparent);
  animation: particleOrb 20s ease-in-out infinite;
}

@keyframes particleFloat {
  0% { 
    transform: translateY(100vh) translateX(0) scale(0);
    opacity: 0;
  }
  10% { opacity: 1; transform: translateY(80vh) translateX(10px) scale(1); }
  50% { transform: translateY(40vh) translateX(-20px) scale(1.2); }
  90% { opacity: 1; }
  100% { 
    transform: translateY(-20vh) translateX(15px) scale(0.5);
    opacity: 0;
  }
}

@keyframes particleSpark {
  0%, 100% { 
    transform: translateY(0) scale(0);
    opacity: 0;
  }
  50% { 
    transform: translateY(-50vh) scale(1);
    opacity: 1;
  }
}

@keyframes particleOrb {
  0%, 100% { 
    transform: translate(0, 0) scale(1);
    opacity: 0.3;
  }
  25% { 
    transform: translate(100px, -100px) scale(1.5);
    opacity: 0.8;
  }
  50% { 
    transform: translate(-50px, -200px) scale(1);
    opacity: 0.5;
  }
  75% { 
    transform: translate(80px, -150px) scale(1.3);
    opacity: 0.7;
  }
}

/* ===== FLOATING TRIGGER ===== */
.trigger {
  position: fixed;
  bottom: 80px;
  right: 14px;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
  z-index: 10000;
  user-select: none;
  animation: triggerEntry 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards, triggerFloat 3s ease-in-out 0.8s infinite;
  transform: scale(0) rotate(-180deg);
}

@keyframes triggerEntry {
  to { transform: scale(1) rotate(0deg); }
}

@keyframes triggerFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-5px) rotate(2deg); }
  75% { transform: translateY(-5px) rotate(-2deg); }
}

.trigger-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(145deg, #1a1a3e, #0a0a20);
  border-radius: 50%;
  box-shadow: 
    0 0 20px rgba(var(--primary-rgb), 0.5),
    0 0 40px rgba(var(--primary-rgb), 0.3),
    inset 0 2px 10px rgba(255,255,255,0.1),
    inset 0 -3px 10px rgba(0,0,0,0.3);
}

.trigger-border {
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    var(--primary),
    var(--secondary),
    var(--success),
    var(--warning),
    var(--primary)
  );
  animation: borderRotate 2s linear infinite;
  z-index: -1;
}

@keyframes borderRotate {
  to { transform: rotate(360deg); }
}

.trigger-border::after {
  content: '';
  position: absolute;
  inset: 3px;
  background: linear-gradient(145deg, #1a1a3e, #0a0a20);
  border-radius: 50%;
}

.trigger:active {
  cursor: grabbing;
  animation: none;
  transform: scale(0.95);
}

.trigger.dragging {
  cursor: grabbing;
  animation: none;
  transform: scale(1.1);
}

.trigger.dragging .trigger-border {
  animation-duration: 0.3s;
}

.trigger-icon {
  font-size: 22px;
  z-index: 2;
  animation: iconBounce 2s ease-in-out infinite;
  filter: drop-shadow(0 0 8px var(--warning));
}

@keyframes iconBounce {
  0%, 100% { transform: scale(1) translateY(0); }
  50% { transform: scale(1.15) translateY(-2px); }
}

.trigger-badge {
  position: absolute;
  top: -5px;
  right: -5px;
  background: linear-gradient(135deg, var(--secondary), var(--danger));
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 7px;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  z-index: 3;
  animation: badgeJump 1.5s ease-in-out infinite;
  box-shadow: 0 0 15px rgba(var(--secondary-rgb), 0.8);
  border: 2px solid rgba(255,255,255,0.3);
}

@keyframes badgeJump {
  0%, 100% { transform: scale(1) rotate(0deg); }
  25% { transform: scale(1.2) rotate(-10deg); }
  75% { transform: scale(1.2) rotate(10deg); }
}

.trigger-pulse {
  position: absolute;
  inset: -8px;
  border: 2px solid var(--primary);
  border-radius: 50%;
  animation: pulseWave 2s ease-out infinite;
}

.trigger-pulse:nth-child(2) {
  animation-delay: 0.4s;
  border-color: var(--secondary);
}

.trigger-pulse:nth-child(3) {
  animation-delay: 0.8s;
  border-color: var(--success);
}

@keyframes pulseWave {
  0% { transform: scale(0.8); opacity: 1; }
  100% { transform: scale(2); opacity: 0; }
}

.trigger-sparkle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #fff;
  border-radius: 50%;
  animation: sparkleMove 3s ease-in-out infinite;
}

.trigger-sparkle:nth-child(5) { top: 0; left: 50%; animation-delay: 0s; }
.trigger-sparkle:nth-child(6) { top: 50%; right: 0; animation-delay: 0.5s; }
.trigger-sparkle:nth-child(7) { bottom: 0; left: 50%; animation-delay: 1s; }
.trigger-sparkle:nth-child(8) { top: 50%; left: 0; animation-delay: 1.5s; }

@keyframes sparkleMove {
  0%, 100% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.5); opacity: 1; }
}

/* ===== OVERLAY ===== */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(5, 5, 16, 0.9);
  z-index: 9998;
  opacity: 0;
  visibility: hidden;
  transition: all 0.4s ease;
}

.overlay.active {
  opacity: 1;
  visibility: visible;
}

/* ===== PANEL ===== */
.panel {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5) rotateY(90deg);
  width: 290px;
  max-width: 92vw;
  z-index: 9999;
  opacity: 0;
  visibility: hidden;
  transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  user-select: none;
}

.panel.active {
  opacity: 1;
  visibility: visible;
  transform: translate(-50%, -50%) scale(1) rotateY(0deg);
}

.panel.dragging {
  transition: none;
}

/* Panel Glow */
.panel-glow {
  position: absolute;
  inset: -4px;
  background: linear-gradient(45deg, var(--primary), var(--secondary), var(--success), var(--primary));
  background-size: 400% 400%;
  border-radius: 18px;
  z-index: -1;
  animation: panelGlowMove 5s ease infinite;
  opacity: 0.8;
}

@keyframes panelGlowMove {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.panel-glow::before {
  content: '';
  position: absolute;
  inset: 4px;
  background: var(--dark);
  border-radius: 14px;
}

/* Panel Electricity */
.panel-electric {
  position: absolute;
  inset: -2px;
  border-radius: 16px;
  overflow: hidden;
  z-index: -1;
}

.electric-line {
  position: absolute;
  background: linear-gradient(90deg, transparent, var(--primary), transparent);
  height: 2px;
  width: 50px;
  animation: electricMove 2s linear infinite;
}

.electric-line:nth-child(1) { top: 0; animation-delay: 0s; }
.electric-line:nth-child(2) { bottom: 0; animation-delay: 0.5s; }
.electric-line:nth-child(3) { 
  top: 0; 
  left: auto; 
  right: 0;
  width: 2px; 
  height: 50px; 
  background: linear-gradient(180deg, transparent, var(--secondary), transparent);
  animation: electricMoveV 2s linear infinite;
  animation-delay: 0.25s;
}
.electric-line:nth-child(4) { 
  bottom: auto;
  top: 0;
  left: 0;
  width: 2px; 
  height: 50px; 
  background: linear-gradient(180deg, transparent, var(--success), transparent);
  animation: electricMoveV 2s linear infinite reverse;
  animation-delay: 0.75s;
}

@keyframes electricMove {
  0% { left: -50px; }
  100% { left: 100%; }
}

@keyframes electricMoveV {
  0% { top: -50px; }
  100% { top: 100%; }
}

/* Panel Header */
.panel-header {
  background: linear-gradient(145deg, #151530, #0a0a1f);
  border-radius: 14px 14px 0 0;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: grab;
  touch-action: none;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(var(--primary-rgb), 0.3);
  border-bottom: none;
}

.panel-header::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
  animation: headerSweep 4s ease-in-out infinite;
}

@keyframes headerSweep {
  0%, 100% { left: -100%; }
  50% { left: 150%; }
}

.header-particles {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}

.header-particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: var(--primary);
  border-radius: 50%;
  animation: headerParticleMove 5s linear infinite;
}

@keyframes headerParticleMove {
  0% { transform: translateX(-10px) translateY(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateX(300px) translateY(-5px); opacity: 0; }
}

.panel-header:active {
  cursor: grabbing;
}

.panel-title {
  font-size: 12px;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  display: flex;
  align-items: center;
  gap: 8px;
  pointer-events: none;
  position: relative;
  z-index: 1;
}

.title-text {
  background: linear-gradient(90deg, var(--primary), var(--secondary), var(--success), var(--primary));
  background-size: 300% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: titleWave 3s linear infinite;
}

@keyframes titleWave {
  to { background-position: 300% center; }
}

.status-container {
  position: relative;
  width: 12px;
  height: 12px;
}

.status-core {
  position: absolute;
  inset: 3px;
  background: var(--success);
  border-radius: 50%;
  animation: statusPulse 1s ease-in-out infinite;
  box-shadow: 0 0 10px var(--success);
}

@keyframes statusPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(0.7); opacity: 0.6; }
}

.status-ring {
  position: absolute;
  inset: 0;
  border: 1px solid var(--success);
  border-radius: 50%;
  animation: statusRingExpand 1.5s ease-out infinite;
}

@keyframes statusRingExpand {
  0% { transform: scale(0.5); opacity: 1; }
  100% { transform: scale(2); opacity: 0; }
}

.close-btn {
  width: 28px;
  height: 28px;
  background: linear-gradient(145deg, var(--danger), #a02040);
  border-radius: 50%;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(255, 56, 96, 0.5);
  z-index: 1;
}

.close-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.4), transparent);
  border-radius: 50% 50% 0 0;
}

.close-btn:hover {
  transform: scale(1.15) rotate(90deg);
}

.close-btn:active {
  transform: scale(0.9) rotate(180deg);
}

.close-icon {
  color: #fff;
  font-size: 16px;
  font-weight: 900;
  pointer-events: none;
  text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}

/* Panel Content */
.panel-content {
  background: linear-gradient(
    160deg,
    rgba(168, 230, 207, 0.98),
    rgba(136, 216, 176, 0.98),
    rgba(184, 169, 201, 0.98),
    rgba(221, 160, 221, 0.98)
  );
  background-size: 400% 400%;
  animation: contentShift 12s ease infinite;
  border-radius: 0 0 14px 14px;
  padding: 14px;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(var(--primary-rgb), 0.3);
  border-top: none;
}

@keyframes contentShift {
  0%, 100% { background-position: 0% 50%; }
  25% { background-position: 50% 0%; }
  50% { background-position: 100% 50%; }
  75% { background-position: 50% 100%; }
}

.content-shine {
  position: absolute;
  top: -100%;
  left: -100%;
  width: 50%;
  height: 200%;
  background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
  animation: contentShine 6s ease-in-out infinite;
  pointer-events: none;
}

@keyframes contentShine {
  0%, 100% { transform: translateX(0) translateY(0) rotate(45deg); }
  50% { transform: translateX(400%) translateY(100%) rotate(45deg); }
}

/* Telegram Button */
.tg-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #0088cc, #00aaff);
  color: #fff;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-decoration: none;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
  margin-bottom: 14px;
  box-shadow: 0 6px 20px rgba(0, 136, 204, 0.5);
  border: 1px solid rgba(255,255,255,0.2);
}

.tg-btn::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -100%;
  width: 40%;
  height: 200%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  transform: rotate(25deg);
  animation: btnShimmer 3s ease-in-out infinite;
}

@keyframes btnShimmer {
  0% { left: -100%; }
  100% { left: 200%; }
}

.tg-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.2), transparent);
  pointer-events: none;
}

.tg-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(0, 136, 204, 0.6);
}

.tg-btn:active {
  transform: translateY(1px) scale(0.98);
}

.tg-icon {
  font-size: 16px;
  animation: planeWiggle 2s ease-in-out infinite;
}

@keyframes planeWiggle {
  0%, 100% { transform: translateX(0) rotate(0deg); }
  25% { transform: translateX(3px) rotate(10deg); }
  75% { transform: translateX(-2px) rotate(-5deg); }
}

/* Info Section */
.info-section {
  background: rgba(0, 0, 0, 0.15);
  border-radius: 14px;
  padding: 14px;
  border: 1px solid rgba(255, 255, 255, 0.15);
  position: relative;
  overflow: hidden;
}

.info-section::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
}

.info-glow {
  position: absolute;
  width: 100px;
  height: 100px;
  background: radial-gradient(circle, rgba(var(--primary-rgb), 0.2), transparent);
  border-radius: 50%;
  animation: infoGlowMove 8s ease-in-out infinite;
  pointer-events: none;
}

@keyframes infoGlowMove {
  0%, 100% { top: -50px; left: -50px; }
  25% { top: -50px; left: calc(100% - 50px); }
  50% { top: calc(100% - 50px); left: calc(100% - 50px); }
  75% { top: calc(100% - 50px); left: -50px; }
}

.info-title {
  font-size: 14px;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  color: #1a1a3e;
  text-align: center;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
  z-index: 1;
}

.title-icon {
  font-size: 18px;
  animation: targetSpin 3s ease-in-out infinite;
  display: inline-block;
}

@keyframes targetSpin {
  0%, 100% { transform: scale(1) rotate(0deg); }
  25% { transform: scale(1.2) rotate(-15deg); }
  50% { transform: scale(1) rotate(0deg); }
  75% { transform: scale(1.2) rotate(15deg); }
}

/* Info Row */
.info-row {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
}

.info-box {
  flex: 1;
  background: rgba(255, 255, 255, 0.25);
  border-radius: 12px;
  padding: 12px;
  text-align: center;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.2);
  transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

.info-box::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: boxShine 4s ease-in-out infinite;
}

@keyframes boxShine {
  0%, 100% { left: -100%; }
  50% { left: 100%; }
}

.info-box:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.info-label {
  font-size: 9px;
  font-weight: 700;
  color: #2d3436;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
  opacity: 0.8;
}

.period-val {
  font-size: 15px;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  color: #1a1a3e;
  letter-spacing: 1px;
  position: relative;
  display: inline-block;
}

.period-val.animate {
  animation: valueFlip 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

@keyframes valueFlip {
  0% { transform: rotateX(90deg) scale(0.5); opacity: 0; }
  100% { transform: rotateX(0deg) scale(1); opacity: 1; }
}

.result-val {
  font-size: 18px;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 1px;
  transition: all 0.4s ease;
  display: inline-block;
}

.result-val.big {
  color: var(--big);
  text-shadow: 0 0 15px var(--big), 0 0 30px var(--big);
  animation: resultBig 1.5s ease-in-out infinite;
}

.result-val.small {
  color: var(--small);
  text-shadow: 0 0 15px var(--small), 0 0 30px var(--small);
  animation: resultSmall 1.5s ease-in-out infinite;
}

@keyframes resultBig {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

@keyframes resultSmall {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

.result-val.animate {
  animation: resultPop 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

@keyframes resultPop {
  0% { transform: scale(0) rotate(-180deg); }
  60% { transform: scale(1.3) rotate(10deg); }
  100% { transform: scale(1) rotate(0deg); }
}

/* Pills Container */
.pills {
  display: flex;
  justify-content: center;
  gap: 18px;
  margin-bottom: 14px;
}

.pill {
  width: 64px;
  height: 56px;
  background: linear-gradient(180deg, #1e1e48, #101028);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  box-shadow: 
    0 8px 30px rgba(0, 0, 0, 0.6),
    inset 0 1px 0 rgba(255,255,255,0.1),
    inset 0 -3px 15px rgba(0,0,0,0.4);
}

.pill-border {

(function() {

  const el = {

  const randSize = () => Math.random() < 0.5 ? 'BIG' : 'SMALL';

  function genPrediction() {

      if (type !== 'particle-orb') {
        const color = colors[rand(0, colors.length - 1)];

  function createConfetti() {

    const shapes = ['circle', 'square', 'triangle'];
    
    for (let i = 0; i < 60; i++) {

      const shape = shapes[rand(0, shapes.length - 1)];
      const color = colors[rand(0, colors.length - 1)];

      c.style.left = rand(10, 90) + '%';

      c.style.height = size + 'px';
      c.style.background = color;

      c.style.animationDelay = rand(0, 500) + 'ms';

  function createToastParticles() {

  function openPanel() {

    element.classList.remove(className);
    void element.offsetWidth;
    element.classList.add(className);
  }

  function render(pred) {
    el.num1.textContent = pred.n1;
    el.num2.textContent = pred.n2;
    animateElement(el.num1, 'animate');
    animateElement(el.num2, 'animate');
    
    el.result.textContent = pred.size;
    el.result.className = 'result-val ' + pred.size.toLowerCase();
    animateElement(el.result, 'animate');
    animateElement(el.period, 'animate');
    
    const acc = (96 + Math.random() * 3).toFixed(1);
    el.accuracy.textContent = acc + '%';
    el.accuracyBar.querySelector('.accuracy-fill').style.width = acc + '%';
    
    showToast();
    createConfetti();
  }

  function makeDraggable(elem, handle, isPanel) {
    let startX, startY, initX, initY;
    let dragging = false, moved = false;

    function getPos(e) {
      const t = e.touches ? e.touches[0] : e;
      return { x: t.clientX, y: t.clientY };
    }

    function onStart(e) {
      if (e.target.closest('.close-btn, .tg-btn')) return;
      
      const pos = getPos(e);
      startX = pos.x;
      startY = pos.y;
      
      const rect = elem.getBoundingClientRect();
      initX = rect.left;
      initY = rect.top;
      
      dragging = true;
      moved = false;

      document.addEventListener('mousemove', onMove, { passive: false });
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('mouseup', onEnd);
      document.addEventListener('touchend', onEnd);
    }

    function onMove(e) {
      if (!dragging) return;
      e.preventDefault();

      const pos = getPos(e);
      const dx = pos.x - startX;
      const dy = pos.y - startY;

      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
        moved = true;
        elem.classList.add('dragging');
      }

      let nx = initX + dx;
      let ny = initY + dy;

      const maxX = window.innerWidth - elem.offsetWidth;
      const maxY = window.innerHeight - elem.offsetHeight;

      nx = Math.max(0, Math.min(nx, maxX));
      ny = Math.max(0, Math.min(ny, maxY));

      elem.style.left = nx + 'px';
      elem.style.top = ny + 'px';
      elem.style.right = 'auto';
      elem.style.bottom = 'auto';
      if (isPanel) elem.style.transform = 'none';
    }

    function onEnd() {
      dragging = false;
      elem.classList.remove('dragging');

      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('mouseup', onEnd);
      document.removeEventListener('touchend', onEnd);

      if (!moved && !isPanel) {
        state.isOpen ? closePanel() : openPanel();
      }
    }

    handle.addEventListener('mousedown', onStart);
    handle.addEventListener('touchstart', onStart, { passive: true });
  }

  async function fetchData() {
    if (state.isAnimating) return;

    try {
      const ctrl = new AbortController();
      const timeout = setTimeout(() => ctrl.abort(), 6000);

      const res = await fetch(API.url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(API.body),
        signal: ctrl.signal
      });

      clearTimeout(timeout);
      if (!res.ok) throw new Error();

      const data = await res.json();

      if (data?.code === 0 && data?.data?.issueNumber) {
        const period = String(data.data.issueNumber);

        if (period !== state.lastPeriod) {
          state.lastPeriod = period;
          state.isAnimating = true;

          el.period.textContent = period.slice(-4);
          showLoaders();

          setTimeout(() => {
            hideLoaders();
            render(genPrediction());
            state.isAnimating = false;
          }, 1500);
        }
      } else {
        throw new Error();
      }
    } catch {
      if (!state.isAnimating) {
        state.isAnimating = true;
        el.period.textContent = '----';
        showLoaders();

        setTimeout(() => {
          hideLoaders();
          render(genPrediction());
          state.isAnimating = false;
        }, 1500);
      }
    }
  }

  function init() {
    createParticles();
    makeDraggable(el.trigger, el.trigger, false);
    makeDraggable(el.panel, el.header, true);

    el.closeBtn.addEventListener('click', closePanel);
    el.overlay.addEventListener('click', closePanel);

    fetchData();
    state.interval = setInterval(fetchData, 2000);

    setTimeout(() => el.loading.classList.add('hide'), 1800);
  }

  window.addEventListener('beforeunload', () => {
    if (state.interval) clearInterval(state.interval);
  });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>

</body>
</html>
