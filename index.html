<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#050510" />
<title>VipHack Pro ⚡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #00f0ff;
  --primary-rgb: 0, 240, 255;
  --secondary: #ff00e5;
  --secondary-rgb: 255, 0, 229;
  --success: #00ff9d;
  --success-rgb: 0, 255, 157;
  --danger: #ff3860;
  --warning: #ffdd00;
  --big: #ff6b6b;
  --small: #4ecdc4;
  --dark: #050510;
  --card: rgba(15, 15, 35, 0.98);
}

* { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  overflow: hidden;
  touch-action: manipulation;
  font-family: 'Rajdhani', sans-serif;
  background: var(--dark);
  color: #fff;
  width: 100vw;
  height: 100vh;
  position: fixed;
}

/* ===== GAME IFRAME ===== */
.game-container {
  position: fixed;
  inset: 0;
  z-index: 1;
}

.game-iframe {
  width: 100%;
  height: 100%;
  border: 0;
}

/* ===== ANIMATED BACKGROUND ===== */
.bg-effects {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  overflow: hidden;
}

.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.4;
  animation: orbFloat 20s ease-in-out infinite;
}

.orb-1 {
  width: 300px;
  height: 300px;
  background: var(--primary);
  top: -100px;
  left: -100px;
  animation-delay: 0s;
}

.orb-2 {
  width: 250px;
  height: 250px;
  background: var(--secondary);
  bottom: -80px;
  right: -80px;
  animation-delay: -7s;
}

.orb-3 {
  width: 200px;
  height: 200px;
  background: var(--success);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation-delay: -14s;
}

@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(30px, -30px) scale(1.1); }
  50% { transform: translate(-20px, 20px) scale(0.9); }
  75% { transform: translate(20px, 10px) scale(1.05); }
}

/* ===== PARTICLES ===== */
.particles {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
}

.particle {
  position: absolute;
  border-radius: 50%;
  opacity: 0;
  animation: particleRise linear infinite;
}

.particle-dot {
  width: 3px;
  height: 3px;
  background: var(--primary);
  box-shadow: 0 0 6px var(--primary), 0 0 12px var(--primary);
}

.particle-star {
  width: 2px;
  height: 2px;
  background: #fff;
  box-shadow: 0 0 4px #fff;
}

@keyframes particleRise {
  0% { 
    transform: translateY(100vh) rotate(0deg);
    opacity: 0;
  }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { 
    transform: translateY(-100vh) rotate(720deg);
    opacity: 0;
  }
}

/* ===== FLOATING TRIGGER ===== */
.trigger {
  position: fixed;
  bottom: 80px;
  right: 14px;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
  z-index: 10000;
  user-select: none;
  animation: triggerFloat 3s ease-in-out infinite, triggerEntry 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  transform: scale(0);
}

@keyframes triggerEntry {
  to { transform: scale(1); }
}

@keyframes triggerFloat {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-8px) scale(1.02); }
}

.trigger::before {
  content: '';
  position: absolute;
  inset: -4px;
  background: conic-gradient(
    from 0deg,
    var(--primary), 
    var(--secondary), 
    var(--success),
    var(--warning),
    var(--primary)
  );
  border-radius: 50%;
  animation: borderSpin 2s linear infinite;
  z-index: -2;
}

@keyframes borderSpin {
  to { transform: rotate(360deg); }
}

.trigger::after {
  content: '';
  position: absolute;
  inset: 3px;
  background: linear-gradient(145deg, #1a1a3e, #0a0a20);
  border-radius: 50%;
  z-index: -1;
  box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
}

.trigger:active {
  cursor: grabbing;
  animation: none;
  transform: scale(0.95);
}

.trigger.dragging {
  cursor: grabbing;
  animation: none;
  transform: scale(1.1);
}

.trigger.dragging::before {
  animation-duration: 0.3s;
  filter: blur(6px);
}

.trigger-inner {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.trigger-icon {
  font-size: 22px;
  filter: drop-shadow(0 0 10px var(--warning)) drop-shadow(0 0 20px var(--warning));
  animation: iconPulse 1.5s ease-in-out infinite;
}

@keyframes iconPulse {
  0%, 100% { transform: scale(1) rotate(0deg); }
  25% { transform: scale(1.1) rotate(-5deg); }
  75% { transform: scale(1.1) rotate(5deg); }
}

.trigger-badge {
  position: absolute;
  top: -6px;
  right: -6px;
  background: linear-gradient(135deg, var(--secondary), var(--danger));
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 7px;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  z-index: 2;
  animation: badgeBounce 2s ease-in-out infinite;
  box-shadow: 0 0 15px rgba(var(--secondary-rgb), 0.8);
  border: 2px solid rgba(255,255,255,0.2);
}

@keyframes badgeBounce {
  0%, 100% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.15) rotate(10deg); }
}

.trigger-ripple {
  position: absolute;
  inset: -10px;
  border: 2px solid var(--primary);
  border-radius: 50%;
  opacity: 0;
  animation: rippleOut 2s ease-out infinite;
}

.trigger-ripple:nth-child(2) {
  animation-delay: 0.5s;
  border-color: var(--secondary);
}

.trigger-ripple:nth-child(3) {
  animation-delay: 1s;
  border-color: var(--success);
}

@keyframes rippleOut {
  0% { transform: scale(0.8); opacity: 1; }
  100% { transform: scale(1.8); opacity: 0; }
}

/* ===== OVERLAY ===== */
.overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(5,5,16,0.85), rgba(0,0,0,0.95));
  z-index: 9998;
  opacity: 0;
  visibility: hidden;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(12px) saturate(180%);
}

.overlay.active {
  opacity: 1;
  visibility: visible;
}

/* ===== PANEL ===== */
.panel {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.7) rotateX(20deg);
  width: 290px;
  max-width: 92vw;
  z-index: 9999;
  opacity: 0;
  visibility: hidden;
  transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  user-select: none;
  perspective: 1000px;
}

.panel.active {
  opacity: 1;
  visibility: visible;
  transform: translate(-50%, -50%) scale(1) rotateX(0);
}

.panel.dragging {
  transition: none;
}

/* Panel Glow */
.panel-glow {
  position: absolute;
  inset: -3px;
  background: linear-gradient(
    45deg,
    var(--primary),
    var(--secondary),
    var(--success),
    var(--warning),
    var(--primary)
  );
  background-size: 400% 400%;
  border-radius: 18px;
  z-index: -1;
  animation: glowMove 6s ease infinite, glowPulse 2s ease-in-out infinite;
  filter: blur(12px);
  opacity: 0.8;
}

@keyframes glowMove {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

@keyframes glowPulse {
  0%, 100% { opacity: 0.6; filter: blur(12px); }
  50% { opacity: 0.9; filter: blur(15px); }
}

/* Panel Border */
.panel-border {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  padding: 2px;
  background: linear-gradient(
    135deg,
    var(--primary),
    var(--secondary),
    var(--success),
    var(--primary)
  );
  background-size: 300% 300%;
  animation: borderFlow 4s ease infinite;
  z-index: -1;
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

@keyframes borderFlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* Panel Header */
.panel-header {
  background: linear-gradient(145deg, #151530, #0a0a1f);
  border-radius: 14px 14px 0 0;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: grab;
  touch-action: none;
  position: relative;
  overflow: hidden;
}

.panel-header::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 50%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255, 255, 255, 0.15),
    transparent
  );
  animation: headerShine 4s ease infinite;
}

@keyframes headerShine {
  0% { left: -100%; }
  100% { left: 200%; }
}

.panel-header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), transparent);
}

.panel-header:active {
  cursor: grabbing;
}

.panel-title {
  font-size: 12px;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  background: linear-gradient(90deg, var(--primary), var(--secondary), var(--success));
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  display: flex;
  align-items: center;
  gap: 8px;
  pointer-events: none;
  animation: titleShine 3s linear infinite;
}

@keyframes titleShine {
  to { background-position: 200% center; }
}

.status-container {
  position: relative;
  width: 10px;
  height: 10px;
}

.status-dot {
  position: absolute;
  inset: 2px;
  background: var(--success);
  border-radius: 50%;
  animation: statusGlow 1.5s ease-in-out infinite;
}

@keyframes statusGlow {
  0%, 100% { 
    box-shadow: 0 0 5px var(--success), 0 0 10px var(--success);
    transform: scale(1);
  }
  50% { 
    box-shadow: 0 0 10px var(--success), 0 0 20px var(--success), 0 0 30px var(--success);
    transform: scale(1.1);
  }
}

.status-ring {
  position: absolute;
  inset: 0;
  border: 1px solid var(--success);
  border-radius: 50%;
  animation: ringExpand 1.5s ease-out infinite;
}

@keyframes ringExpand {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(2.5); opacity: 0; }
}

.close-btn {
  width: 26px;
  height: 26px;
  background: linear-gradient(145deg, var(--danger), #c0392b);
  border-radius: 50%;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(255, 56, 96, 0.4);
}

.close-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.3), transparent);
  border-radius: 50% 50% 0 0;
}

.close-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 6px 20px rgba(255, 56, 96, 0.6);
}

.close-btn:active {
  transform: scale(0.9) rotate(90deg);
}

.close-icon {
  color: #fff;
  font-size: 16px;
  font-weight: 900;
  pointer-events: none;
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

/* Panel Content */
.panel-content {
  background: linear-gradient(
    160deg,
    rgba(168, 230, 207, 0.97),
    rgba(136, 216, 176, 0.97),
    rgba(184, 169, 201, 0.97),
    rgba(221, 160, 221, 0.97)
  );
  background-size: 400% 400%;
  animation: contentGradient 10s ease infinite;
  border-radius: 0 0 14px 14px;
  padding: 14px;
  position: relative;
  overflow: hidden;
}

@keyframes contentGradient {
  0%, 100% { background-position: 0% 50%; }
  25% { background-position: 100% 0%; }
  50% { background-position: 100% 100%; }
  75% { background-position: 0% 100%; }
}

.panel-content::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(
    circle at center,
    rgba(255, 255, 255, 0.2) 0%,
    transparent 60%
  );
  animation: contentSpin 15s linear infinite;
  pointer-events: none;
}

@keyframes contentSpin {
  to { transform: rotate(360deg); }
}

/* Telegram Button */
.tg-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #0088cc, #00aaff, #0088cc);
  background-size: 200% auto;
  color: #fff;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-decoration: none;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  margin-bottom: 14px;
  box-shadow: 
    0 6px 20px rgba(0, 136, 204, 0.4),
    inset 0 1px 0 rgba(255,255,255,0.3),
    inset 0 -2px 5px rgba(0,0,0,0.1);
  animation: btnGlow 3s ease-in-out infinite;
}

@keyframes btnGlow {
  0%, 100% { box-shadow: 0 6px 20px rgba(0, 136, 204, 0.4); }
  50% { box-shadow: 0 6px 30px rgba(0, 136, 204, 0.7), 0 0 40px rgba(0, 170, 255, 0.3); }
}

.tg-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255, 255, 255, 0.4),
    transparent
  );
  animation: btnShine 2.5s ease infinite;
}

@keyframes btnShine {
  0% { left: -100%; }
  100% { left: 150%; }
}

.tg-btn:hover {
  transform: translateY(-2px) scale(1.02);
  background-position: right center;
}

.tg-btn:active {
  transform: translateY(1px) scale(0.98);
}

.tg-icon {
  font-size: 16px;
  animation: planeMove 2s ease-in-out infinite;
}

@keyframes planeMove {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  25% { transform: translate(3px, -3px) rotate(10deg); }
  75% { transform: translate(-2px, 2px) rotate(-5deg); }
}

/* Info Section */
.info-section {
  background: rgba(0, 0, 0, 0.12);
  border-radius: 14px;
  padding: 12px;
  border: 1px solid rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  position: relative;
  overflow: hidden;
}

.info-section::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
}

.info-title {
  font-size: 13px;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  color: #1a1a3e;
  text-align: center;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-shadow: 0 1px 2px rgba(255,255,255,0.5);
}

.title-icon {
  font-size: 16px;
  animation: targetBounce 1s ease-in-out infinite;
}

@keyframes targetBounce {
  0%, 100% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.3) rotate(15deg); }
}

/* Info Row */
.info-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}

.info-box {
  flex: 1;
  background: linear-gradient(145deg, rgba(255,255,255,0.25), rgba(255,255,255,0.1));
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.2);
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.info-box::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.2), transparent);
  pointer-events: none;
}

.info-box:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

.info-label {
  font-size: 8px;
  font-weight: 700;
  color: #2d3436;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
  opacity: 0.8;
}

.period-val {
  font-size: 14px;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  color: #1a1a3e;
  letter-spacing: 1px;
  animation: numberPulse 2s ease-in-out infinite;
}

@keyframes numberPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.result-val {
  font-size: 16px;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 1px;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.result-val.big {
  color: var(--big);
  text-shadow: 0 0 10px var(--big), 0 0 20px var(--big), 0 0 30px var(--big);
  animation: bigPulse 1.5s ease-in-out infinite;
}

.result-val.small {
  color: var(--small);
  text-shadow: 0 0 10px var(--small), 0 0 20px var(--small), 0 0 30px var(--small);
  animation: smallPulse 1.5s ease-in-out infinite;
}

@keyframes bigPulse {
  0%, 100% { transform: scale(1); filter: brightness(1); }
  50% { transform: scale(1.1); filter: brightness(1.2); }
}

@keyframes smallPulse {
  0%, 100% { transform: scale(1); filter: brightness(1); }
  50% { transform: scale(1.1); filter: brightness(1.2); }
}

/* Pills Container */
.pills {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 12px;
}

.pill {
  width: 60px;
  height: 52px;
  background: linear-gradient(180deg, #1e1e45, #12122a);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 
    0 8px 25px rgba(0, 0, 0, 0.5),
    inset 0 1px 0 rgba(255,255,255,0.1),
    inset 0 -3px 10px rgba(0,0,0,0.3);
}

.pill::before {
  content: '';
  position: absolute;
  inset: -3px;
  background: linear-gradient(
    45deg,
    var(--primary),
    var(--secondary),
    var(--success),
    var(--primary)
  );
  background-size: 300% 300%;
  border-radius: 17px;
  z-index: -1;
  animation: pillBorder 4s ease infinite;
}

@keyframes pillBorder {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.pill::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 50%;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.15), transparent);
  border-radius: 14px 14px 0 0;
  pointer-events: none;
}

.pill.active {
  animation: pillFloat 3s ease-in-out infinite;
}

@keyframes pillFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

.pill:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 
    0 12px 35px rgba(var(--primary-rgb), 0.4),
    0 0 50px rgba(var(--secondary-rgb), 0.2);
}

.pill-num {
  font-size: 24px;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  color: #fff;
  text-shadow: 
    0 0 10px rgba(255, 255, 255, 0.5),
    0 0 20px rgba(var(--primary-rgb), 0.5),
    0 0 30px rgba(var(--primary-rgb), 0.3);
  z-index: 1;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.pill-num.animate {
  animation: numberReveal 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes numberReveal {
  0% { transform: scale(0) rotate(-180deg); opacity: 0; }
  50% { transform: scale(1.3) rotate(10deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

.pill-loader {
  position: absolute;
  width: 24px;
  height: 24px;
  border: 3px solid rgba(255, 255, 255, 0.1);
  border-top-color: var(--primary);
  border-right-color: var(--secondary);
  border-bottom-color: var(--success);
  border-radius: 50%;
  animation: spinLoader 0.8s linear infinite;
  display: none;
  box-shadow: 0 0 15px rgba(var(--primary-rgb), 0.5);
}

@keyframes spinLoader {
  to { transform: rotate(360deg); }
}

.pill.loading .pill-num { 
  opacity: 0; 
  transform: scale(0.5) rotate(180deg); 
}
.pill.loading .pill-loader { display: block; }

/* Accuracy Bar */
.accuracy {
  background: linear-gradient(145deg, rgba(255,255,255,0.25), rgba(255,255,255,0.1));
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.2);
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.accuracy::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: var(--acc-width, 97%);
  background: linear-gradient(90deg, 
    rgba(var(--success-rgb), 0.3), 
    rgba(var(--primary-rgb), 0.3)
  );
  transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 10px;
}

.accuracy::after {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: var(--acc-width, 97%);
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: accShine 2s ease infinite;
  border-radius: 10px;
}

@keyframes accShine {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.acc-label {
  font-size: 9px;
  font-weight: 700;
  color: #2d3436;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  z-index: 1;
}

.acc-val {
  font-size: 14px;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  color: var(--success);
  text-shadow: 0 0 10px var(--success), 0 0 20px var(--success);
  z-index: 1;
  animation: accPulse 2s ease-in-out infinite;
}

@keyframes accPulse {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.4); }
}

/* Toast */
.toast {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(80px) scale(0.8);
  background: linear-gradient(135deg, var(--success), var(--primary));
  color: #000;
  padding: 10px 20px;
  border-radius: 30px;
  font-weight: 700;
  font-size: 11px;
  font-family: 'Orbitron', sans-serif;
  z-index: 10001;
  opacity: 0;
  visibility: hidden;
  transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 
    0 8px 30px rgba(var(--success-rgb), 0.5),
    0 0 50px rgba(var(--primary-rgb), 0.3),
    inset 0 1px 0 rgba(255,255,255,0.3);
}

.toast.show {
  opacity: 1;
  visibility: visible;
  transform: translateX(-50%) translateY(0) scale(1);
}

.toast-icon {
  font-size: 14px;
  animation: toastPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes toastPop {
  0% { transform: scale(0) rotate(-180deg); }
  60% { transform: scale(1.3) rotate(10deg); }
  100% { transform: scale(1) rotate(0); }
}

/* Confetti */
.confetti {
  position: fixed;
  pointer-events: none;
  z-index: 10002;
}

.confetti-piece {
  position: absolute;
  width: 8px;
  height: 8px;
  background: var(--primary);
  animation: confettiFall 3s ease-out forwards;
}

@keyframes confettiFall {
  0% { 
    transform: translateY(0) rotate(0deg) scale(1);
    opacity: 1;
  }
  100% { 
    transform: translateY(100vh) rotate(720deg) scale(0);
    opacity: 0;
  }
}

/* Loading Screen */
.loading-screen {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, #0f0f2a, #050510);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 99999;
  transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.loading-screen.hide {
  opacity: 0;
  visibility: hidden;
  transform: scale(1.1);
}

.loader-container {
  position: relative;
  width: 60px;
  height: 60px;
}

.loader-ring {
  position: absolute;
  inset: 0;
  border: 3px solid transparent;
  border-radius: 50%;
}

.loader-ring:nth-child(1) {
  border-top-color: var(--primary);
  animation: spin 1s linear infinite;
}

.loader-ring:nth-child(2) {
  inset: 6px;
  border-right-color: var(--secondary);
  animation: spin 1.5s linear infinite reverse;
}

.loader-ring:nth-child(3) {
  inset: 12px;
  border-bottom-color: var(--success);
  animation: spin 2s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.load-text {
  font-size: 16px;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  background: linear-gradient(90deg, var(--primary), var(--secondary), var(--success), var(--primary));
  background-size: 300% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: textFlow 2s linear infinite;
  letter-spacing: 2px;
}

@keyframes textFlow {
  to { background-position: 300% center; }
}

.load-bar {
  width: 120px;
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  overflow: hidden;
}

.load-progress {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  border-radius: 4px;
  animation: loadProgress 1.5s ease-in-out infinite;
}

@keyframes loadProgress {
  0% { width: 0%; transform: translateX(0); }
  50% { width: 100%; transform: translateX(0); }
  100% { width: 100%; transform: translateX(100%); }
}

/* Responsive */
@media (max-width: 340px) {
  .panel { width: 270px; }
  .pill { width: 54px; height: 46px; }
  .pill-num { font-size: 22px; }
  .trigger { width: 48px; height: 48px; }
}
</style>
</head>
<body>

<div class="game-container">
  <iframe class="game-iframe" id="gameIframe"
    src="https://www.jaiclub12.com/#/register?invitationCode=12535329836"
    allowfullscreen allow="autoplay; fullscreen; payment"></iframe>
</div>

<div class="bg-effects">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="particles" id="particles"></div>

<div class="loading-screen" id="loadingScreen">
  <div class="loader-container">
    <div class="loader-ring"></div>
    <div class="loader-ring"></div>
    <div class="loader-ring"></div>
  </div>
  <div class="load-text">VIPHACK PRO</div>
  <div class="load-bar">
    <div class="load-progress"></div>
  </div>
</div>

<div class="toast" id="toast">
  <span class="toast-icon">✓</span>
  <span>PREDICTION READY</span>
</div>

<div class="overlay" id="overlay"></div>

<div class="trigger" id="trigger">
  <div class="trigger-ripple"></div>
  <div class="trigger-ripple"></div>
  <div class="trigger-ripple"></div>
  <div class="trigger-inner">
    <span class="trigger-icon">⚡</span>
  </div>
  <span class="trigger-badge">AI</span>
</div>

<div class="panel" id="panel">
  <div class="panel-glow"></div>
  <div class="panel-border"></div>
  <div class="panel-header" id="header">
    <div class="panel-title">
      <div class="status-container">
        <span class="status-dot"></span>
        <span class="status-ring"></span>
      </div>
      <span>VIPHACK PRO</span>
    </div>
    <button class="close-btn" id="closeBtn">
      <span class="close-icon">×</span>
    </button>
  </div>
  
  <div class="panel-content">
    <a href="https://t.me/+uHChLR19OwA5MTM1" class="tg-btn" target="_blank">
      <span class="tg-icon">✈</span>
      <span>JOIN VIP CHANNEL</span>
    </a>
    
    <div class="info-section">
      <div class="info-title">
        <span class="title-icon">🎯</span>
        <span>AI PREDICTION</span>
      </div>
      
      <div class="info-row">
        <div class="info-box">
          <div class="info-label">Period</div>
          <div class="period-val" id="period">----</div>
        </div>
        <div class="info-box">
          <div class="info-label">Result</div>
          <div class="result-val" id="result">--</div>
        </div>
      </div>
      
      <div class="pills">
        <div class="pill active" id="pill1">
          <span class="pill-num" id="num1">-</span>
          <div class="pill-loader"></div>
        </div>
        <div class="pill active" id="pill2">
          <span class="pill-num" id="num2">-</span>
          <div class="pill-loader"></div>
        </div>
      </div>
      
      <div class="accuracy" id="accuracyBar">
        <span class="acc-label">Today's Accuracy</span>
        <span class="acc-val" id="accuracy">97.8%</span>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  const API = {
    url: 'https://api.bdg88zf.com/api/webapi/GetGameIssue',
    body: {
      typeId: 1,
      language: 0,
      random: "40079dcba93a48769c6ee9d4d4fae23f",
      signature: "D12108C4F57C549D82B23A91E0FA20AE",
      timestamp: 1727792520
    }
  };

  const $ = id => document.getElementById(id);
  
  const el = {
    loading: $('loadingScreen'),
    toast: $('toast'),
    overlay: $('overlay'),
    trigger: $('trigger'),
    panel: $('panel'),
    header: $('header'),
    closeBtn: $('closeBtn'),
    period: $('period'),
    result: $('result'),
    pill1: $('pill1'),
    pill2: $('pill2'),
    num1: $('num1'),
    num2: $('num2'),
    accuracy: $('accuracy'),
    accuracyBar: $('accuracyBar'),
    particles: $('particles')
  };

  const state = {
    lastPeriod: null,
    isOpen: false,
    isAnimating: false,
    interval: null
  };

  const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
  const randSize = () => Math.random() < 0.5 ? 'BIG' : 'SMALL';

  function genPrediction() {
    let n1 = rand(0, 9);
    let n2 = rand(0, 9);
    while (n2 === n1) n2 = rand(0, 9);
    return { n1, n2, size: randSize() };
  }

  function createParticles() {
    const types = ['particle-dot', 'particle-star'];
    const colors = ['--primary', '--secondary', '--success', '--warning'];
    
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = `particle ${types[rand(0, 1)]}`;
      p.style.left = rand(0, 100) + '%';
      p.style.animationDelay = rand(0, 20) + 's';
      p.style.animationDuration = rand(10, 25) + 's';
      
      const color = colors[rand(0, colors.length - 1)];
      p.style.background = `var(${color})`;
      p.style.boxShadow = `0 0 6px var(${color}), 0 0 12px var(${color})`;
      
      el.particles.appendChild(p);
    }
  }

  function createConfetti() {
    const colors = ['#00f0ff', '#ff00e5', '#00ff9d', '#ffdd00', '#ff6b6b', '#4ecdc4'];
    const container = document.createElement('div');
    container.className = 'confetti';
    document.body.appendChild(container);

    for (let i = 0; i < 50; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = rand(20, 80) + '%';
      piece.style.top = '40%';
      piece.style.background = colors[rand(0, colors.length - 1)];
      piece.style.animationDelay = rand(0, 500) + 'ms';
      piece.style.animationDuration = rand(2000, 4000) + 'ms';
      piece.style.borderRadius = rand(0, 1) ? '50%' : '0';
      piece.style.transform = `rotate(${rand(0, 360)}deg)`;
      container.appendChild(piece);
    }

    setTimeout(() => container.remove(), 4000);
  }

  function showToast() {
    el.toast.classList.add('show');
    setTimeout(() => el.toast.classList.remove('show'), 2500);
  }

  function openPanel() {
    if (state.isOpen) return;
    state.isOpen = true;
    el.panel.classList.add('active');
    el.overlay.classList.add('active');
    el.trigger.style.opacity = '0.3';
    el.trigger.style.pointerEvents = 'none';
    el.panel.style.left = '50%';
    el.panel.style.top = '50%';
    el.panel.style.transform = 'translate(-50%, -50%)';
  }

  function closePanel() {
    if (!state.isOpen) return;
    state.isOpen = false;
    el.panel.classList.remove('active');
    el.overlay.classList.remove('active');
    el.trigger.style.opacity = '1';
    el.trigger.style.pointerEvents = 'auto';
  }

  function showLoaders() {
    el.pill1.classList.add('loading');
    el.pill2.classList.add('loading');
  }

  function hideLoaders() {
    el.pill1.classList.remove('loading');
    el.pill2.classList.remove('loading');
  }

  function animateNumber(element, value) {
    element.textContent = value;
    element.classList.remove('animate');
    void element.offsetWidth;
    element.classList.add('animate');
  }

  function render(pred) {
    animateNumber(el.num1, pred.n1);
    animateNumber(el.num2, pred.n2);
    
    el.result.textContent = pred.size;
    el.result.className = 'result-val ' + pred.size.toLowerCase();
    
    const acc = (96 + Math.random() * 3).toFixed(1);
    el.accuracy.textContent = acc + '%';
    el.accuracyBar.style.setProperty('--acc-width', acc + '%');
    
    showToast();
    createConfetti();
  }

  function makeDraggable(elem, handle, isPanel) {
    let startX, startY, initX, initY;
    let dragging = false, moved = false;

    function getPos(e) {
      const t = e.touches ? e.touches[0] : e;
      return { x: t.clientX, y: t.clientY };
    }

    function onStart(e) {
      if (e.target.closest('.close-btn, .tg-btn')) return;
      
      const pos = getPos(e);
      startX = pos.x;
      startY = pos.y;
      
      const rect = elem.getBoundingClientRect();
      initX = rect.left;
      initY = rect.top;
      
      dragging = true;
      moved = false;

      document.addEventListener('mousemove', onMove, { passive: false });
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('mouseup', onEnd);
      document.addEventListener('touchend', onEnd);
    }

    function onMove(e) {
      if (!dragging) return;
      e.preventDefault();

      const pos = getPos(e);
      const dx = pos.x - startX;
      const dy = pos.y - startY;

      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) {
        moved = true;
        elem.classList.add('dragging');
      }

      let nx = initX + dx;
      let ny = initY + dy;

      const maxX = window.innerWidth - elem.offsetWidth;
      const maxY = window.innerHeight - elem.offsetHeight;

      nx = Math.max(0, Math.min(nx, maxX));
      ny = Math.max(0, Math.min(ny, maxY));

      elem.style.left = nx + 'px';
      elem.style.top = ny + 'px';
      elem.style.right = 'auto';
      elem.style.bottom = 'auto';
      if (isPanel) elem.style.transform = 'none';
    }

    function onEnd() {
      dragging = false;
      elem.classList.remove('dragging');

      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('mouseup', onEnd);
      document.removeEventListener('touchend', onEnd);

      if (!moved && !isPanel) {
        state.isOpen ? closePanel() : openPanel();
      }
    }

    handle.addEventListener('mousedown', onStart);
    handle.addEventListener('touchstart', onStart, { passive: true });
  }

  async function fetchData() {
    if (state.isAnimating) return;

    try {
      const ctrl = new AbortController();
      const timeout = setTimeout(() => ctrl.abort(), 6000);

      const res = await fetch(API.url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(API.body),
        signal: ctrl.signal
      });

      clearTimeout(timeout);
      if (!res.ok) throw new Error();

      const data = await res.json();

      if (data?.code === 0 && data?.data?.issueNumber) {
        const period = String(data.data.issueNumber);

        if (period !== state.lastPeriod) {
          state.lastPeriod = period;
          state.isAnimating = true;

          el.period.textContent = period.slice(-4);
          showLoaders();

          setTimeout(() => {
            hideLoaders();
            render(genPrediction());
            state.isAnimating = false;
          }, 1500);
        }
      } else {
        throw new Error();
      }
    } catch {
      if (!state.isAnimating) {
        state.isAnimating = true;
        el.period.textContent = '----';
        showLoaders();

        setTimeout(() => {
          hideLoaders();
          render(genPrediction());
          state.isAnimating = false;
        }, 1500);
      }
    }
  }

  function init() {
    createParticles();
    makeDraggable(el.trigger, el.trigger, false);
    makeDraggable(el.panel, el.header, true);

    el.closeBtn.addEventListener('click', closePanel);
    el.overlay.addEventListener('click', closePanel);

    fetchData();
    state.interval = setInterval(fetchData, 2000);

    setTimeout(() => el.loading.classList.add('hide'), 1500);
  }

  window.addEventListener('beforeunload', () => {
    if (state.interval) clearInterval(state.interval);
  });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>

</body>
